<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />

    <title>Electro - Laptops</title>

    <link
      href="https://fonts.googleapis.com/css?family=Montserrat:400,500,700"
      rel="stylesheet"
    />
    <link
      type="text/css"
      rel="stylesheet"
      href="../assets/css/bootstrap.min.css"
    />
    <link
      type="text/css"
      rel="stylesheet"
      href="../assets/css/font-awesome.min.css"
    />
    <link type="text/css" rel="stylesheet" href="../assets/css/style.css" />
    <link type="text/css" rel="stylesheet" href="../assets/css/laptops.css" />
  </head>
  <body>
    <nav id="navigation">
      <div class="container">
        <div id="responsive-nav">
          <ul class="main-nav nav navbar-nav">
            <li><a href="../index.html">Home</a></li>
            <li><a href="products.html">Products</a></li>
            <li><a href="cart.html">Cart</a></li>
            <li><a href="about.html">About</a></li>
            <li class="active"><a href="laptops.html">Laptops</a></li>
            <li><a href="phones.html">Phones</a></li>
            <li><a href="accessories.html">Accessories</a></li>
            <li><a href="cameras.html">Cameras</a></li>
          </ul>
        </div>
      </div>
    </nav>

    <div class="section">
      <div class="container" id="container">
        <div class="row">
          <div class="col-md-12">
            <div class="section-title">
              <h3 class="title">Laptops</h3>
            </div>
          </div>
        </div>
      </div>
    </div>

    <div id="sidebar-overlay" onclick="closeSideBar()"></div>

    <div id="product-sidebar">
      <button id="sidebar-close" onclick="closeSideBar()">
        <i class="fa fa-times"></i>
      </button>

      <div class="product-img">
        <img id="sidebar-img" src="" alt="" />
      </div>

      <div class="product-body">
        <p class="product-category">Laptop</p>
        <h3 class="product-name" id="sidebar-title"></h3>
        <h4 class="product-price" id="sidebar-price"></h4>
        <p id="sidebar-description"></p>

        <label for="sidebar-qty">Quantity</label>
        <div class="input-number">
          <input type="number" id="sidebar-qty" value="1" min="1" readonly />
          <span class="qty-up" onclick="plus()">+</span>
          <span class="qty-down" onclick="minus()">-</span>
        </div>

        <button class="primary-btn" onclick="addToCart()">Add to Cart</button>
      </div>
    </div>

    <script src="../assets/js/laptops.js"></script>
  </body>
